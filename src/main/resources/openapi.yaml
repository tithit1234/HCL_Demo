openapi: 3.0.0
info:
  title: Inventory API
  version: 1.0.0
paths:
  /api/inventories/search:
    post:
      summary: Search inventory
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventorySearchDTO'
      responses:
        '200':
          description: Successful search
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Inventory'
components:
  schemas:
    Inventory:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        category: { type: string }
        price: { type: number }
        location: { type: string }
    InventorySearchDTO:
      type: object
      properties:
        name: { type: string }
        category: { type: string }
        price: { type: number }
        location: { type: string }
